data_roots:
  - real/headline_binary

generation:
  sample_size: 20
  rules_per_call: 5

num_train_samples: null
num_valid_samples: null
num_test_samples: null
data_seed: 42
repeat: 1

max_rules: 10
rule_prune_metric: acc
rule_coverage_threshold: 0.2
model_selection_metric: acc
best_model_metric: acc

evaluation:
  modes: regression_only

llms:
  generation:
    rule_learning_model: deepseek-chat
    evaluation_models:
      - deepseek-chat
    temperature: 0.0
    max_tokens: 8000
    max_retries: 3
  evaluation:
    temperature: 0.0
    request_timeout: 300
    num_predict: 8000
    max_concurrent_per_key: 4
    max_retries: 5
    disable_thinking_models: []
    reasoning_effort_models: {}
    chat_template_kwargs_models: {}
  client:
    base_url: ${RLIE_BASE_URL}
    api_key: ${RLIE_API_KEY}

convergence:
  min_improvement: 0.001
  max_rounds: 20
  patience: 3

elastic_net:
  max_iter: 20000
  tol: 0.001
  fit_intercept: true
  warm_start: false
  class_weight: balanced
  random_state: 42
  cv_folds: 5
  n_jobs: -1

logging:
  output_dir: outputs
  save_features: true
  print_generation_prompts: false
