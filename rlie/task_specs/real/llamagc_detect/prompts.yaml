observations:
  multi_content: |
    Here is a story: <BEGIN_story>
    "${story}"<END_story>

    ${label_description}.
batched_generation:
  system: |-
    You're a an AI generated content detection expert. You are great at detecting what type of text is generated by AI.
    Given a set of texts, we want to generate hypotheses that are useful for predicting whether a piece of text is generated by AI. In other words, we want to know whether the text is written by a human or generated by AI.

    Your task is to identify what patterns or traits show up more in AI generated texts, and what shows up more in human written texts.  Focus on the generalizable insight that can be applied in other contexts. Ignore things that are specific to this story. Do not make references this story they may not be for others.

    Using the given examples, please propose ${num_hypotheses} possible hypothesis pairs.
    When proposing hypothesis, look closely into the given examples and identify specific patterns that occur across the provided text examples.
    The hypotheses should be clear, easy to understand, and have specific details such that one can apply the hypotheses to predict whether a piece of text is written by human or AI.

    Generate them in the format of 1. [hypothesis], 2. [hypothesis], ... ${num_hypotheses}. [hypothesis].
    The hypotheses should analyze what kind of text is likely to be written by human or AI.
  user: |-
    We have seen some texts:
    ${observations}
    Please generate hypotheses that are useful for predicting predicting whether a piece of text is written by human or AI.
    Propose ${num_hypotheses} possible hypotheses. Generate them in the format of 1. [hypothesis], 2. [hypothesis], ... ${num_hypotheses}. [hypothesis].

    When proposing hypothesis, look closely into the given examples and identify specific patterns that occur across the provided text examples.

    Please make sure that the hypotheses are:
    i. clear (i.e., precise , not too wordy , and easy to understand);
    ii. generalizable to novel situations (i.e., they would make sense if applied to other AI generated content detection experiments or other messaging contexts);
    iii. empirically plausible (i.e., this is a dimension on which messages can vary on);
    iv. unidimensional (i.e., avoid hypotheses that list multiple constructs so if there are many things changing , pick one);
    v. usable (i.e., a human equipped with this insight could use it to predict if a new piece of text is generated AI in a similar way)

    Proposed hypotheses:
batched_generation_refine:
  system: |-
    You're a an AI generated content detection expert. You are great at detecting what type of text is generated by AI.
    Given a set of texts, we want to generate hypotheses that are useful for predicting whether a piece of text is generated by AI. In other words, we want to know whether the text is written by a human or generated by AI.

    Using mispredicted (misclassified) examples and the past hypotheses, your goal is to rethink and then propose ${num_hypotheses} new, more accurate hypothesis pairs.
    Focus on transferable insights that apply beyond these specific stories. Avoid story-specific references and highlight stylistic patterns, structure, or lexical choices that generalize.

    Generate the hypotheses in the format of 1. [hypothesis], 2. [hypothesis], ... ${num_hypotheses}. [hypothesis].
    Each hypothesis should include:
    a. A condition indicating AI-generated tendencies
    b. The counterpart condition describing HUMAN-written tendencies
  user: |-
    Here are stories that previous hypotheses classified incorrectly:
    ${observations}

    Prior hypotheses for reference:
    ${hypotheses_text}

    Please generate new hypotheses to improve predictions of whether a story is written by human or AI.
    You may refine the previous hypotheses (like tightening conditions, adding exceptions, or rephrasing), or introduce new hypotheses to cover new, distinct angles when prior ones are insufficient or misaligned.

    Propose ${num_hypotheses} possible hypotheses.
    Generate them in the format of 1. [hypothesis], 2. [hypothesis], ... ${num_hypotheses}. [hypothesis].
    Proposed hypotheses:
IO_refine_with_feedback:
  system: ''
  user: |-
    Applying your rule to the following inputs does not produce the expected outputs.
    Here's your proposed hypothesis: ${hypothesis_text}
    Below is some examples that you predicted wrong using the hypothesis.
    ${observations}
    Please generate new hypotheses that maps the given inputs to their corresponding outputs.
    Propose ${num_hypotheses} possible hypotheses. Generate them in the format of 1. [hypothesis], 2. [hypothesis], ... ${num_hypotheses}. [hypothesis].
inference:
  system: "You are an AI generated content detection agent and want to determine whether a piece of text is written by a human or generated by an AI. \nIn other words, we want to know whether the text is written by a human or generated by AI.\nFrom past experiences, you learned a pattern.\nYou need to determine whether each of the patterns holds for the current piece of text, and also predict whether the current text is written by human or AI.\nGive an answer. The answer should be (AI or HUMAN or not applicable).\nGive your final answer in the format of {Final answer: AI}, {Final answer: HUMAN} or {Final answer: not applicable}."
  user: |-
    Our learned patterns: ${hypothesis}
    New text:
    Here is a story: "${story}"

    Given the pattern you learned above, give an answer of whether the current text is written by human or AI.

    You can:
    1. Consider if the pattern can be applied to the story.
    2. If the pattern applies, is this story written by human or AI? It is also fine if pattern does not apply.

    Please give your final answer in the format of {Final answer: AI}, {Final answer: HUMAN} or {Final answer: not applicable}.
multiple_hypotheses_inference:
  system: "You are an AI generated content detection agent and want to determine whether a piece of text is written by a human or generated by an AI. \nIn other words, we want to know whether the text is written by a human or generated by AI.\nFrom past experiences, you learned some patterns.\nYou need to determine whether each of the patterns holds for the current text, and also predict whether the current text is written by human or AI.\nGive an answer. The answer should be one word (AI or HUMAN).\nGive your final answer in the format of {Final answer: AI} or {Final answer: HUMAN}."
  user: |-
    Our learned patterns: ${hypotheses}
    New text:
    Here is a story: "${story}"

    Given the patterns you learned above, give an answer of whether the current text is written by human or AI.

    You can:
    1.Think about which pattern can be applied to the story.
    2.Decide whether this story written by human or AI, you can use these patterns as reference.

    Please give your final answer in the format of {Final answer: AI} or {Final answer: HUMAN}.
multiple_hypotheses_inference_with_linear_regression:
  system: "You are an AI generated content detection agent and want to determine whether a piece of text is written by a human or generated by an AI. \nIn other words, we want to know whether the text is written by a human or generated by AI. \nWe trained a linear regression model on the training set to obtain a collection of weighted patterns plus a bias term. The learned weight reflects how strongly the pattern contributes to predicting \"human\" vs \"AI\".\nReview the weighted patterns, consider how the bias interacts with them, and use the regression model's suggested label as a reference. \nGive an answer. The answer should be one word (AI or HUMAN).\nGive your final answer in the format of {Final answer: AI} or {Final answer: HUMAN}."
  user: "Our learned weighted patterns (the weight's magnitude reflects the pattern's importance):\n${weighted_hypotheses}\n\nBias term (a constant offset added regardless of pattern activations; a positive bias means the model is overall more inclined toward ${pos_label}, while a negative bias leans toward ${neg_label}):\n${bias}\n\nNew text:\nHere is a story: \"${story}\"\n\nGiven the patterns you learned above, give an answer of whether the current text is written by human or AI. \n\nYou can:\n1. Think about which pattern can be applied to the story.\n2. Decide whether this story is written by human or AI, you can used the weighted patterns and bias for reference.\n\nPlease give your final answer in the format of {Final answer: AI} or {Final answer: HUMAN}."
multiple_hypotheses_inference_with_linear_regression_and_label:
  system: "You are an AI generated content detection agent and want to determine whether a piece of text is written by a human or generated by an AI. \nIn other words, we want to know whether the text is written by a human or generated by AI. \nWe trained a linear regression model on the training set to obtain a collection of weighted patterns plus a bias term. The learned weight reflects how strongly the pattern contributes to predicting \"human\" vs \"AI\". The regression model also outputs a referenced label for the review, which should be treated as a suggestion.\nReview the weighted patterns, consider how the bias interacts with them, and use the regression model's suggested label as a reference. \nGive an answer. The answer should be one word (AI or HUMAN).\nGive your final answer in the format of {Final answer: AI} or {Final answer: HUMAN}."
  user: "Our learned weighted patterns (the weight's magnitude reflects the pattern's importance):\n${weighted_hypotheses}\n\nBias term (a constant offset added regardless of pattern activations; a positive bias means the model is overall more inclined toward ${pos_label}, while a negative bias leans toward ${neg_label}):\n${bias}\n\nNew text:\nHere is a story: \"${story}\"\n\nWe have used the regression model to get a referenced label: ${model_prediction}\n\nGiven the patterns you learned above, give an answer of whether the current text is written by human or AI. \n\nYou can:\n1. Think about which pattern can be applied to the story.\n2. Decide whether this story is written by human or AI, you can used the weighted patterns, bias, predicted label as reference.\n\nPlease give your final answer in the format of {Final answer: AI} or {Final answer: HUMAN}."
